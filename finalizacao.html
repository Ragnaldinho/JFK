<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra Finalizada com Sucesso!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .icone-sucesso {
            font-size: 64px;
            color: #10b981; /* Verde sucesso */
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #111827;
        }
        p {
            font-size: 16px;
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .detalhes-pedido {
            background-color: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            margin-bottom: 30px;
            text-align: left;
        }
        .detalhes-pedido span {
            font-weight: bold;
        }
        .btn-voltar {
            display: inline-block;
            background-color: #3b82f6; /* Azul */
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .btn-voltar:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icone-sucesso">✔️</div>
        <h1>Compra Confirmada!</h1>
        <p>Sua compra foi processada com sucesso. Agradecemos pela sua preferência! Um e-mail com os detalhes do seu pedido foi enviado para você.</p>
        
        <div class="detalhes-pedido">
            <p style="margin-bottom: 5px;"><span>Número do Pedido:</span> #987654321</p>
            <p style="margin-bottom: 0;"><span>Status:</span> Pagamento Aprovado</p>
        </div>

        <a href="index.html" class="btn-voltar">Voltar para a Loja</a>
    </div>

</body>
</html>
